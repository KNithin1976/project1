<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Country Guessing Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e272e;
      color: white;
    }

    header {
      background: #485460;
      padding: 15px;
      text-align: center;
    }

    #map {
      height: calc(100vh - 80px);
    }

    /* Special floating input box */
    #panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    input {
      padding: 12px;
      font-size: 18px;
      width: 250px;
      border-radius: 8px;
      border: none;
      outline: none;
      text-align: center;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: orange;
      color: black;
    }

    #result {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<header>
  <h1>🌍 Country Guessing Game</h1>
</header>

<div id="map"></div>

<div id="panel">
  <button onclick="startGame()">Start Game</button>
  <br><br>

  <form onsubmit="event.preventDefault(); checkAnswer();">
    <input type="text" id="answer" placeholder="Type country name...">
    <br>
    <button type="submit">Submit</button>
  </form>

  <div id="result"></div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let geoLayer;
  let currentCountry = "";

  fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
    .then(res => res.json())
    .then(data => {
      geoLayer = L.geoJSON(data, {
        style: {
          color: '#fff',
          weight: 1,
          fillColor: '#576574',
          fillOpacity: 0.5
        }
      }).addTo(map);

      window.allCountries = geoLayer.getLayers();
    });

  function startGame() {
    document.getElementById('result').textContent = '';
    document.getElementById('answer').value = '';

    geoLayer.eachLayer(layer => {
      geoLayer.resetStyle(layer);
    });

    const randomLayer = allCountries[Math.floor(Math.random() * allCountries.length)];
    currentCountry = randomLayer.feature.properties.name;

    randomLayer.setStyle({ fillColor: 'orange', fillOpacity: 0.8 });

    map.fitBounds(randomLayer.getBounds());
  }

  function checkAnswer() {
    const userAnswer = document.getElementById('answer').value.trim().toLowerCase();
    const correct = currentCountry.toLowerCase();

    if (!currentCountry) return;

    if (userAnswer === correct) {
      document.getElementById('result').textContent = '✅ Correct! It is ' + currentCountry;
    } else {
      document.getElementById('result').textContent = '❌ Wrong! Correct answer: ' + currentCountry;
    }
  }
</script>

</body>
</html>
